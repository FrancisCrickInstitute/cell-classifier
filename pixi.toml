[workspace]
authors = ["Dave Barry <david.barry@crick.ac.uk>"]
channels = ["conda-forge"]
name = "cell-classifier"
platforms = ["win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "<3.14"
pixi-pycharm = ">=0.0.12,<0.0.13"

[environments]
cell-class = ["default"]

[pypi-dependencies]
tensorflow = ">=2.21.0, <3"
stardist = ">=0.9.2, <0.10"
numpy = ">=2.4.6, <3"
pandas = ">=3.0.5, <4"
bioio = ">=3.4.0, <4"
scikit-image = ">=0.26.0, <0.27"
scikit-learn = ">=1.9.0, <2"
bioio-bioformats = ">=2.0.0, <3"
tqdm = ">=4.69.0, <5"
